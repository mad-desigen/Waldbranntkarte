name: Stabile WBI-Kartenanwendung veröffentlichen

on:
  push:
    branches: [main]
    paths-ignore: ["data/**"]
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: wbi-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Ursprüngliche affine Kartenlogik mit Korrekturen vorbereiten
        run: |
          rm -rf site
          mkdir -p site/data
          curl -L --fail --retry 4 --retry-delay 2 \
            "https://raw.githubusercontent.com/mad-desigen/Waldbranntkarte/6f93769615ae1ea3ce578ede1b7837675e0f91d3/index.html" \
            -o site/index.html
          cp legacy-engine-fix.js ui-custom.js ui-custom.css site/
          cp WBI_GEOlayers_Einfaerben_MA.jsx site/
          cp WBI_GEOlayers_Einfaerben_AKT.jsx site/
          python - <<'PY'
          from pathlib import Path

          path = Path('site/index.html')
          text = path.read_text(encoding='utf-8')

          old_start = 'init(false);'
          new_start = 'window.__startWBI = () => init(false);'
          if old_start not in text:
              raise SystemExit('Startaufruf der Ursprungsanwendung wurde nicht gefunden.')
          text = text.replace(old_start, new_start, 1)

          text = text.replace(
              '</head>',
              '<link rel="stylesheet" href="ui-custom.css?v=3"></head>',
              1,
          )
          text = text.replace(
              '</body>',
              '<script src="legacy-engine-fix.js?v=2"></script>'
              '<script src="ui-custom.js?v=3"></script>'
              '<script>window.__startWBI();</script></body>',
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
          touch site/.nojekyll

      - name: Aktuelle DWD-Daten abrufen
        run: python scripts/update_data.py --output site/data

      - name: Kartenfunktion, neutrale Oberfläche und Farbfilterung prüfen
        run: |
          test -s site/index.html
          test -s site/legacy-engine-fix.js
          test -s site/ui-custom.js
          test -s site/ui-custom.css
          test -s site/WBI_GEOlayers_Einfaerben_MA.jsx
          test -s site/WBI_GEOlayers_Einfaerben_AKT.jsx
          test -s site/data/status.json
          test -s site/data/states.geojson
          test -s site/data/wbi_0.png
          test -s site/data/wbi_1.png
          test -s site/data/wbi_2.png
          test -s site/data/wbi_3.png
          test -s site/data/wbi_4.png
          grep -q 'function fitToGermany' site/index.html
          grep -q 'window.__startWBI' site/index.html
          grep -q 'legacy-engine-fix.js?v=2' site/index.html
          grep -q 'ui-custom.js?v=3' site/index.html
          grep -q 'preparePaletteOnly' site/legacy-engine-fix.js
          grep -q 'fitPaletteToGermany' site/legacy-engine-fix.js
          grep -q 'sampleFittedStrict' site/legacy-engine-fix.js
          grep -q 'MA' site/ui-custom.js
          grep -q 'AKT' site/ui-custom.js
          if grep -R -q 'MiMa\|Aktuell\|MiMa-Logo\|AKTUELL-Logo' site; then exit 1; fi
          node --check site/legacy-engine-fix.js
          node --check site/ui-custom.js

      - name: Anwendung veröffentlichen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Neutrale WBI-Oberfläche ohne Sendebezug veröffentlicht"
