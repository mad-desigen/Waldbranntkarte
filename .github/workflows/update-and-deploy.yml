name: Originale WBI-Funktion mit reduzierter Oberfläche veröffentlichen

on:
  push:
    branches: [main]
    paths-ignore: ["data/**"]
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: wbi-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Unveränderte ursprüngliche Kartenfunktion vorbereiten
        run: |
          rm -rf site
          mkdir -p site/data
          curl -L --fail --retry 4 --retry-delay 2 \
            "https://raw.githubusercontent.com/mad-desigen/Waldbranntkarte/6f93769615ae1ea3ce578ede1b7837675e0f91d3/index.html" \
            -o site/index.html
          cp ui-custom.js ui-custom.css site/
          cp MiMa-Logo.svg AKTUELL-Logo.svg site/
          cp WBI_GEOlayers_Einfaerben_MiMa-Farben.jsx site/
          cp WBI_GEOlayers_Einfaerben_Aktuell-Farben.jsx site/
          python - <<'PY'
          from pathlib import Path
          path = Path('site/index.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace('</head>', '<link rel="stylesheet" href="ui-custom.css?v=1"></head>', 1)
          text = text.replace('</body>', '<script src="ui-custom.js?v=1"></script></body>', 1)
          path.write_text(text, encoding='utf-8')
          PY
          touch site/.nojekyll

      - name: Aktuelle DWD-Daten abrufen
        run: python scripts/update_data.py --output site/data

      - name: Grundfunktion und Erweiterungen prüfen
        run: |
          test -s site/index.html
          test -s site/ui-custom.js
          test -s site/data/status.json
          test -s site/data/states.geojson
          test -s site/data/wbi_0.png
          grep -q 'function largestColorComponent' site/index.html
          grep -q 'function prepareSource' site/index.html
          grep -q 'function fitToGermany' site/index.html
          grep -q 'function sampleSource' site/index.html
          grep -q 'ui-custom.js?v=1' site/index.html
          grep -q 'MiMa-Farben' site/ui-custom.js
          grep -q 'Aktuell-Farben' site/ui-custom.js
          grep -q 'fillOpacity: 1' site/ui-custom.js

      - name: Anwendung veröffentlichen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Unveränderte ursprüngliche WBI-Funktion mit reduzierter Oberfläche veröffentlicht"
