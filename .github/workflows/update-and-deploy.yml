name: Reduzierte WBI-Anwendung veröffentlichen

on:
  push:
    branches: [main]
    paths-ignore: ["data/**"]
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: wbi-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Reduzierte Anwendung vorbereiten
        run: |
          rm -rf site
          mkdir -p site/data
          cp index.html app.css app.js fix.js site/
          cp MiMa-Logo.svg AKTUELL-Logo.svg site/
          cp WBI_GEOlayers_Einfaerben_MiMa-Farben.jsx site/
          cp WBI_GEOlayers_Einfaerben_Aktuell-Farben.jsx site/
          touch site/.nojekyll

      - name: Aktuelle DWD-Daten abrufen
        run: python scripts/update_data.py --output site/data

      - name: Oberfläche und Daten prüfen
        run: python .github/scripts/validate_reduced_site.py

      - name: Anwendung veröffentlichen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Reduzierte WBI-Anwendung mit Farbumschaltung, Skript-Download und 100 Prozent Deckkraft veröffentlicht"
