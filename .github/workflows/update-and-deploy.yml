name: DWD-Daten aktualisieren und GitHub Pages veröffentlichen

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Python-Abhängigkeiten installieren
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Statische Website vorbereiten
        run: |
          rm -rf site
          mkdir -p site/data
          cp index.html site/index.html
          touch site/.nojekyll

      - name: Aktuelle DWD-Daten abrufen
        run: python scripts/update_data.py --output site/data

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v5
