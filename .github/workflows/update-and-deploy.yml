name: Aktuelle DWD-WBI-Daten veröffentlichen

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: wbi-publish
  cancel-in-progress: false

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Website vorbereiten
        run: |
          rm -rf site
          mkdir -p site/data
          cp index.html site/index.html
          cp palette-cleanup.js site/palette-cleanup.js
          cp geojson-naming.js site/geojson-naming.js
          cp freshness-fix.js site/freshness-fix.js
          touch site/.nojekyll
          python - <<'PY'
          from pathlib import Path

          path = Path("site/index.html")
          text = path.read_text(encoding="utf-8")
          marker = "init();"
          position = text.rfind(marker)
          if position < 0:
              raise SystemExit("Startaufruf init() wurde in index.html nicht gefunden.")
          text = text[:position] + text[position + len(marker):]
          body = (
              '<script src="palette-cleanup.js"></script>'
              '<script src="geojson-naming.js"></script>'
              '<script src="freshness-fix.js"></script>'
              '<script>init();</script>'
          )
          if "</body>" not in text:
              raise SystemExit("Schließendes body-Element fehlt.")
          text = text.replace("</body>", body + "</body>", 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: DWD-Daten ohne Cache abrufen
        run: python scripts/update_data.py --output site/data

      - name: Datenstand und Dateizuordnung prüfen
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          from zoneinfo import ZoneInfo

          root = Path("site")
          status = json.loads((root / "data/status.json").read_text(encoding="utf-8"))

          if status.get("ok") is not True:
              raise SystemExit("status.json meldet keinen erfolgreichen Abruf.")
          if status.get("stale") is not False:
              raise SystemExit("Der Datensatz ist als veraltet markiert.")

          available = sorted(int(day) for day in status.get("available_days", []))
          if available != [0, 1, 2, 3, 4]:
              raise SystemExit(f"Es fehlen Prognosetage: {available}")

          updated = datetime.fromisoformat(status["updated_at"].replace("Z", "+00:00"))
          age_hours = (datetime.now(timezone.utc) - updated).total_seconds() / 3600
          if age_hours > 2:
              raise SystemExit(f"Der soeben erzeugte Datenstatus ist bereits {age_hours:.1f} Stunden alt.")

          berlin_today = datetime.now(ZoneInfo("Europe/Berlin")).date()
          for day in available:
              expected = (berlin_today + timedelta(days=day)).isoformat()
              actual = status.get("forecast_dates", {}).get(str(day))
              if actual != expected:
                  raise SystemExit(f"Falsches Prognosedatum für Tag {day}: {actual}, erwartet {expected}")

              image = root / f"data/wbi_{day}.png"
              body = image.read_bytes()
              if len(body) <= 1000 or not body.startswith(b"\x89PNG\r\n\x1a\n"):
                  raise SystemExit(f"Ungültige PNG-Datei: {image}")

          html = (root / "index.html").read_text(encoding="utf-8")
          required_scripts = (
              "palette-cleanup.js",
              "geojson-naming.js",
              "freshness-fix.js",
          )
          for script in required_scripts:
              if script not in html:
                  raise SystemExit(f"Erforderliches Skript wurde nicht eingebunden: {script}")
          if html.count("init();") != 1:
              raise SystemExit("Die Anwendung wird nicht genau einmal gestartet.")

          cleanup = (root / "palette-cleanup.js").read_text(encoding="utf-8").lower()
          for color in ("#800126", "#e9151c", "#ff8c39", "#ffd879", "#ffffce"):
              if color not in cleanup:
                  raise SystemExit(f"WBI-Farbe fehlt in der Filterung: {color}")

          naming = (root / "geojson-naming.js").read_text(encoding="utf-8").lower()
          for name in (
              "sehr hohe gefahr",
              "hohe gefahr",
              "mittlere gefahr",
              "geringe gefahr",
              "sehr geringe gefahr",
          ):
              if name not in naming:
                  raise SystemExit(f"GeoJSON-Feature-Name fehlt: {name}")
          for color in ("#a62121", "#fd6165", "#fabb7a", "#f8f287", "#d0cbc2"):
              if color not in naming:
                  raise SystemExit(f"Gestaltungsfarbe fehlt: {color}")

          print("Aktuelle DWD-Daten, Farbfilterung und GeoJSON-Benennung erfolgreich geprüft.")
          PY

      - name: Geprüfte Website nach GitHub Pages veröffentlichen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Aktuelle DWD-WBI-Daten mit benannten GeoJSON-Flächen veröffentlicht"
