name: Ursprüngliche WBI-Anwendung veröffentlichen

on:
  push:
    branches: [main]
    paths-ignore: ["data/**"]
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: wbi-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Unveränderten Ursprungsstand vorbereiten
        run: |
          rm -rf site
          mkdir -p site/data
          curl -L --fail --retry 4 --retry-delay 2 \
            "https://raw.githubusercontent.com/mad-desigen/Waldbranntkarte/6f93769615ae1ea3ce578ede1b7837675e0f91d3/index.html" \
            -o site/index.html
          touch site/.nojekyll

      - name: Aktuelle DWD-Daten abrufen
        run: python scripts/update_data.py --output site/data

      - name: Ursprüngliche Kartenfunktion prüfen
        run: |
          test -s site/index.html
          test -s site/data/status.json
          test -s site/data/states.geojson
          test -s site/data/wbi_0.png
          test -s site/data/wbi_1.png
          test -s site/data/wbi_2.png
          test -s site/data/wbi_3.png
          test -s site/data/wbi_4.png
          grep -q 'function largestColorComponent' site/index.html
          grep -q 'function prepareSource' site/index.html
          grep -q 'function fitToGermany' site/index.html
          grep -q 'function sampleSource' site/index.html
          grep -q 'function renderVector' site/index.html
          if grep -q 'ui-custom.js' site/index.html; then exit 1; fi
          if grep -q 'palette-cleanup.js' site/index.html; then exit 1; fi
          if grep -q 'fix.js' site/index.html; then exit 1; fi

      - name: Ursprungsstand veröffentlichen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Ursprüngliche WBI-Anwendung vollständig wiederhergestellt"
