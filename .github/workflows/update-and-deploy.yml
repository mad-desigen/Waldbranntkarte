name: WBI-Veröffentlichung pausiert

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  paused:
    runs-on: ubuntu-latest
    steps:
      - name: Hinweis
        run: |
          echo "Die automatische Veröffentlichung ist vorübergehend deaktiviert."
          echo "Der Branch gh-pages bleibt auf dem zuletzt funktionierenden Stand, bis die neue Ausrichtungs- und Konturfilterung separat geprüft wurde."
